<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nestly — Real Estate Listing Portal</title>
<link rel="stylesheet" href="majorProjectSunstone.css">
</head>
<body>


<header>
  <h1 class="logo">Nestly</h1>
  <nav>
    <a href="#listings">Listings</a>
    <a href="#calculator">Mortgage Calculator</a>
    <a href="#contact">Contact Agent</a>
  </nav>
</header>


<section class="hero">
  <h2>Find your next home</h2>
  <p>Search our listings by location and maximum budget.</p>

  <div class="search-box">
    <input type="text" id="locationInput" placeholder="Location (e.g. Rowanwood)">
    <input type="number" id="maxPriceInput" placeholder="Max price (e.g. 500000)">
    <button id="searchBtn">Search</button>
    <button id="resetBtn">Reset</button>
  </div>
</section>


<section id="listings">
  <h2>Available Properties</h2>
  <p id="resultText"></p>
  <div id="listingsGrid" class="listings-grid"></div>
</section>


<section id="calculator">
  <h2>Mortgage Calculator</h2>
  <p>Enter the home price, interest rate and loan term to estimate your monthly payment.</p>

  <div class="calc-box">
    <label for="calcPrice">Home Price ($)</label>
    <input type="number" id="calcPrice" value="400000">

    <label for="calcRate">Interest Rate (% per year)</label>
    <input type="number" id="calcRate" value="7">

    <label for="calcYears">Loan Term (years)</label>
    <input type="number" id="calcYears" value="20">

    <button id="calcBtn">Calculate</button>

    <p id="calcResult"></p>
  </div>
</section>


<section id="contact">
  <h2>Contact an Agent</h2>
  <form id="contactForm">
    <label for="nameInput">Your Name</label>
    <input type="text" id="nameInput">

    <label for="emailInput">Your Email</label>
    <input type="text" id="emailInput">

    <label for="messageInput">Message</label>
    <textarea id="messageInput" rows="4"></textarea>

    <button type="submit">Send Message</button>
  </form>
  <p id="formResult"></p>
</section>


<footer>
  <p>Nestly</p>
</footer>

<script src="majorProjectSunstone.js"></script>
</body>
</html>
